name: Release version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer tag to publish, for example v0.1.0"
        required: true
        type: string
      target_ref:
        description: "Commit or ref to tag; must match the latest successful production deploy"
        required: false
        default: "main"
        type: string
      dry_run:
        description: "Validate and print notes without creating the tag or release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve release inputs
        id: release
        run: |
          set -euo pipefail
          git fetch --tags --force

          VERSION="$(python .agents/skills/claude-ios-release/scripts/release_preflight.py '${{ inputs.version }}')"
          TARGET_REF='${{ inputs.target_ref }}'
          TARGET_SHA="$(git rev-parse "${TARGET_REF}^{commit}")"

          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists" >&2
            exit 1
          fi

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

      - name: Verify latest successful production deploy
        run: |
          set -euo pipefail
          TARGET_SHA='${{ steps.release.outputs.target_sha }}'
          LATEST_DEPLOY_SHA="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "Deploy production" \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha')"

          if [ -z "$LATEST_DEPLOY_SHA" ]; then
            echo "No successful Deploy production run found" >&2
            exit 1
          fi

          if [ "$LATEST_DEPLOY_SHA" != "$TARGET_SHA" ]; then
            echo "Target SHA ${TARGET_SHA} does not match latest successful deployed SHA ${LATEST_DEPLOY_SHA}" >&2
            exit 1
          fi

      - name: Run tests
        run: python -m pytest

      - name: Build release notes
        run: |
          set -euo pipefail
          python .agents/skills/claude-ios-release/scripts/build_release_notes.py \
            '${{ steps.release.outputs.version }}' \
            --target-sha '${{ steps.release.outputs.target_sha }}' \
            --output release-notes.md
          cat release-notes.md

      - name: Create tag and GitHub release
        if: ${{ inputs.dry_run != true }}
        run: |
          set -euo pipefail
          VERSION='${{ steps.release.outputs.version }}'
          TARGET_SHA='${{ steps.release.outputs.target_sha }}'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" "$TARGET_SHA" -m "Release $VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$TARGET_SHA" \
            --title "$VERSION" \
            --notes-file release-notes.md
