<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员后台 - Claude iOS Repair</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23255fdb"/%3E%3Cpath d="M18 32h28M32 18v28" stroke="white" stroke-width="7" stroke-linecap="round"/%3E%3C/svg%3E'>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/admin" aria-label="管理员后台首页">Claude iOS Repair Admin</a>
    <nav aria-label="后台导航">
      <a href="/">用户指南</a>
      <a href="#invites">邀请码列表</a>
    </nav>
  </header>

  <main class="admin-main">
    <section class="admin-hero" aria-labelledby="admin-title">
      <div>
        <p class="eyebrow">Admin Console</p>
        <h1 id="admin-title">邀请码管理</h1>
        <p class="lede">创建一次性修复入口，用户通过邀请码查看自己的专属代理端口和实时状态。</p>
      </div>
      <button id="logout-button" class="button secondary" type="button" hidden>退出登录</button>
    </section>

    <section id="login-panel" class="panel admin-panel" aria-labelledby="login-title">
      <div class="section-head">
        <p class="eyebrow">Sign in</p>
        <h2 id="login-title">管理员登录</h2>
      </div>
      <form id="login-form" class="admin-form">
        <label for="admin-username">管理员账号</label>
        <input id="admin-username" name="username" autocomplete="username" placeholder="输入管理员账号" required>

        <label for="admin-password">管理员密码</label>
        <div class="password-field">
          <input id="admin-password" name="password" type="password" autocomplete="current-password" placeholder="输入管理员密码" required>
          <button id="password-toggle" class="password-toggle" type="button" aria-label="显示密码" aria-controls="admin-password" aria-pressed="false">
            <span class="password-toggle-eye" aria-hidden="true"></span>
          </button>
        </div>

        <button type="submit">登录后台</button>
      </form>
      <p id="login-feedback" class="admin-feedback" aria-live="polite"></p>
    </section>

    <section id="admin-workspace" class="admin-workspace" hidden>
      <section class="panel admin-panel" aria-labelledby="create-title">
        <div class="section-head">
          <p class="eyebrow">Invite</p>
          <h2 id="create-title">创建邀请码</h2>
        </div>
        <form id="create-form" class="admin-form create-form">
          <label for="invite-note">备注</label>
          <input id="invite-note" name="note" autocomplete="off" placeholder="例如：张三 iPhone 15" required>

          <label for="invite-expires-at">过期时间</label>
          <input id="invite-expires-at" name="expires_at" type="datetime-local">

          <button type="submit">创建邀请码</button>
        </form>
        <p id="create-feedback" class="admin-feedback" aria-live="polite"></p>
      </section>

      <section id="invites" class="panel admin-panel invites-panel" aria-labelledby="invites-title">
        <div class="admin-list-head">
          <div>
            <p class="eyebrow">Users</p>
            <h2 id="invites-title">邀请码列表</h2>
          </div>
          <button id="refresh-button" class="button secondary" type="button">刷新</button>
        </div>

        <p class="admin-note">每个邀请码会分配一个独立代理端口。用户配置 Wi-Fi 代理时关闭认证，只填写服务器和端口。</p>

        <div id="invite-summary" class="invite-summary-grid" aria-label="邀请码运营摘要">
          <button class="invite-summary-card" type="button" data-quick-filter="needs_followup" aria-pressed="false">
            <span>待跟进</span>
            <strong data-summary-count="needs_followup">0</strong>
          </button>
          <button class="invite-summary-card" type="button" data-quick-filter="used_pending" aria-pressed="false">
            <span>已连接未修复</span>
            <strong data-summary-count="used_pending">0</strong>
          </button>
          <button class="invite-summary-card" type="button" data-quick-filter="expiring_soon" aria-pressed="false">
            <span>即将过期</span>
            <strong data-summary-count="expiring_soon">0</strong>
          </button>
          <button class="invite-summary-card" type="button" data-quick-filter="completed_today" aria-pressed="false">
            <span>今日完成</span>
            <strong data-summary-count="completed_today">0</strong>
          </button>
        </div>

        <form id="invite-filters" class="admin-filters" aria-label="邀请码筛选">
          <label for="invite-query">
            关键词
            <input id="invite-query" name="q" autocomplete="off" placeholder="邀请码、备注、IP、地区或端口">
          </label>

          <label for="invite-status-filter">
            状态
            <select id="invite-status-filter" name="status">
              <option value="all">全部状态</option>
              <option value="active">有效</option>
              <option value="disabled">停用</option>
              <option value="expired">已过期</option>
            </select>
          </label>

          <label for="invite-repair-filter">
            修复状态
            <select id="invite-repair-filter" name="repair_status">
              <option value="all">全部</option>
              <option value="completed">已完成修复</option>
              <option value="pending">未完成</option>
            </select>
          </label>

          <label for="invite-page-size">
            每页
            <select id="invite-page-size" name="page_size">
              <option value="10">10 条</option>
              <option value="20" selected>20 条</option>
              <option value="50">50 条</option>
            </select>
          </label>

          <button class="button secondary" type="submit">查询</button>
        </form>

        <div id="active-filter-chips" class="invite-filter-chips" aria-label="当前筛选"></div>
        <p id="invite-list-feedback" class="invite-list-feedback" aria-live="polite" hidden></p>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>邀请码</th>
                <th>状态</th>
                <th>备注</th>
                <th>来源</th>
                <th>修复状态</th>
                <th>代理端口</th>
                <th>过期时间</th>
                <th>最后使用</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="invite-table">
              <tr>
                <td colspan="9">登录后加载邀请码</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div id="invite-card-list" class="invite-card-list" aria-label="邀请码卡片列表"></div>

        <div id="invite-pagination" class="admin-pagination" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <div id="disable-confirm-modal" class="admin-modal" role="dialog" aria-modal="true" aria-labelledby="disable-confirm-title" hidden>
    <div class="admin-modal-dialog">
      <p class="eyebrow">Disable Invite</p>
      <h2 id="disable-confirm-title">确认停用邀请码？</h2>
      <p>停用后会释放代理端口，用户将无法继续使用这个邀请码。</p>
      <p class="admin-modal-code" id="disable-confirm-code"></p>
      <div class="admin-modal-actions">
        <button class="button secondary" type="button" data-disable-cancel>取消</button>
        <button class="button primary danger" type="button" data-disable-confirm>确认停用</button>
      </div>
    </div>
  </div>

  <script src="/admin.js" defer></script>
</body>
</html>
