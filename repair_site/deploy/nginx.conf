server {
    listen 80;
    listen [::]:80;
    server_name sg2.claude89757.cc claude89757.cc;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sg2.claude89757.cc claude89757.cc;

    ssl_certificate /etc/letsencrypt/live/sg2.claude89757.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sg2.claude89757.cc/privkey.pem;

    root /opt/claude-ios-repair/repair_site/web;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    location = /admin/ {
        try_files /admin.html =404;
    }

    location = /certs/mitmproxy-ca-cert.cer {
        alias /opt/claude-ios-repair/mitmproxy/mitmproxy-ca-cert.cer;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="mitmproxy-ca-cert.cer"';
        add_header Cache-Control "no-store";
    }

    location /certs/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
